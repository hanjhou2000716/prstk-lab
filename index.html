    function openDrawer(index) {
      const data = appData[index];
      
      document.getElementById('drawer-title').innerText = data.title;
      document.getElementById('drawer-subtitle').innerText = data.subtitle;
      document.getElementById('drawer-link').href = data.link;

      const featuresUl = document.getElementById('drawer-features');
      featuresUl.innerHTML = '';
      data.features.forEach(feat => {
        const li = document.createElement('li');
        li.innerText = feat;
        featuresUl.appendChild(li);
      });

      const targetsUl = document.getElementById('drawer-targets');
      targetsUl.innerHTML = '';
      data.targets.forEach(t => {
        const li = document.createElement('li');
        li.innerText = t;
        targetsUl.appendChild(li);
      });

      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('hidden');
      setTimeout(() => {
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-y-full');
      }, 10);
    }

    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('opacity-100');
      drawer.classList.add('translate-y-full');
      
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 350);
    }

    function shareApp() {
      if (navigator.share) {
        navigator.share({
          title: 'PRStK Lab',
          text: 'PRStK Lab - 想和你一起慢慢變富。',
          url: window.location.href
        }).catch(console.error);
      } else {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-12 left-1/2 -translate-x-1/2 bg-muji-brand text-white text-[11px] px-4 py-2.5 rounded-full tracking-widest z-50 shadow-md transition-opacity duration-300 whitespace-nowrap';
        toast.innerText = 'Together Better 連結已複製';
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => document.body.removeChild(toast), 300);
        }, 1500);
      }
    }
  </script>
