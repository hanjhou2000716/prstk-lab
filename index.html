<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRStK Lab</title>

  <!-- App 圖示設定 (iOS 與 Android) -->
  <link rel="apple-touch-icon" href="PRStK app.png">
  <link rel="manifest" href="manifest.json">

  <!-- 預留給 Analytics 的區塊 (未來可在此貼上 Google Analytics 或 Umami 追蹤碼) -->
  <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR-GA-ID"></script> -->

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans TC & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- AOS 動畫庫 CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
          },
          colors: {
            muji: {
              bg: '#FAF8F5',      /* 暖麻白 */
              text: '#3C3935',    /* 溫潤炭灰 */
              muted: '#625D56',   /* 亞麻深灰 - 提高清晰度 */
              border: '#E3DDD5',  /* 溫暖的水泥灰線條 */
              accent: '#8E7F72',  /* 淺木褐 */
              hover: '#F5EFE6',   /* 溫暖觸摸色 */
              brand: '#4A606D',   /* ⭐ 品牌色：擷取自 Logo 的沉穩灰藍色 */
              brandLight: '#EEF2F4'/* ⭐ 品牌色超淺底色，用於標籤與 Hover */
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 隱藏滾動條，確保無印極簡視覺 */
    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar {
      display: none;
    }
    /* 滑出抽屜動畫 */
    .drawer-transition {
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>
<body class="bg-muji-bg text-muji-text font-sans min-h-[100dvh] flex flex-col justify-between overflow-x-hidden select-none">
  <!-- 背景微光裝飾（極簡無印風） -->
  <div class="absolute inset-0 bg-[radial-gradient(#E8E1D5_1.2px,transparent_1.2px)] [background-size:20px_20px] opacity-70 pointer-events-none"></div>

  <!-- 主容器 (限制最大寬度，動態調整內邊距確保五個按鈕一頁呈現) -->
  <div class="relative w-full max-w-md mx-auto min-h-[100dvh] flex flex-col justify-between px-5 pt-6 pb-6 z-10">
    
    <!-- 1. 頭部區域 -->
    <header class="flex flex-col items-center text-center">
       <!-- 標誌圖片 (加入 AOS 淡入向下動畫) -->
      <div class="w-full flex items-center justify-center mb-2 mt-0" data-aos="fade-down" data-aos-duration="800">
        <img 
          id="logo-img"
          src="PRStK Lab-Remove.png" 
          alt="PRStK Lab Logo" 
          class="w-[95%] max-w-[350px] h-auto max-h-[15vh] object-contain transition-opacity duration-300"
          onerror="handleLogoError()"
        />
        <!-- 備用純文字 Logo (若圖片未載入時優雅呈現，並套用品牌色) -->
        <div id="logo-fallback" class="hidden flex-col items-center">
          <span class="text-3xl font-light tracking-[0.25em] text-muji-brand">PRStK Lab</span>
          <span class="text-[11px] uppercase tracking-[0.4em] text-muji-muted mt-1">Quant Trading</span>
        </div>
      </div>
      
      <!-- 副標題 (加入 AOS 淡入動畫) -->
      <p class="text-[12px] tracking-[0.2em] text-muji-muted font-normal flex items-center justify-center gap-2" data-aos="fade-in" data-aos-delay="200" data-aos-duration="800">
        <span>量化選股</span>
        <span class="text-[10px] text-muji-border font-light">|</span>
        <span>紀律交易</span>
        <span class="text-[10px] text-muji-border font-light">|</span>
        <span>策略優化</span>
      </p>
    </header>

    <!-- 2. 按鈕導覽區 -->
    <main class="flex-1 flex flex-col justify-start mt-5 gap-2.5 mb-2">
      
      <!-- ⭐ 引導文案 (微小、精緻的 Muji Style 引導) -->
      <div class="text-[10px] tracking-[0.15em] text-muji-muted/80 ml-1 mb-1 font-light flex items-center gap-1.5" data-aos="fade-right" data-aos-delay="200">
        <i data-lucide="compass" class="w-3 h-3"></i> 選擇工具開始分析
      </div>

      <!-- 按鈕 1: AI 智慧產業地圖 -->
      <div class="relative group" data-aos="fade-up" data-aos-delay="100">
        <a href="https://aistockmap.com" 
           target="_blank"
           class="flex items-center justify-between w-full py-3.5 px-4 bg-white border border-muji-border rounded-xl shadow-[0_2px_8px_rgba(215,208,196,0.15)] hover:shadow-[0_8px_20px_rgba(74,96,109,0.12)] hover:-translate-y-1 hover:border-muji-brand/40 active:scale-[0.99] transition-all duration-300 pr-12">
          <div class="flex flex-col items-start text-left">
            <span class="text-[14.5px] font-medium tracking-wide text-muji-text group-hover:text-muji-brand transition-colors">🌐 AI 智慧產業地圖</span>
            <span class="text-[10px] text-muji-muted tracking-wider mt-0.5 font-light pl-[26px]">AI Stock Map</span>
          </div>
          <i data-lucide="arrow-up-right" class="w-4 h-4 text-muji-muted opacity-40 group-hover:text-muji-brand group-hover:opacity-100 group-hover:translate-x-1 group-hover:-translate-y-1 transition-all duration-300"></i>
        </a>
        <button onclick="openDrawer(0)" 
                class="absolute right-0 top-0 bottom-0 w-11 flex items-center justify-center border-l border-muji-border border-opacity-30 hover:bg-muji-brandLight rounded-r-xl transition-colors duration-150"
                aria-label="詳細資訊">
          <i data-lucide="info" class="w-4 h-4 text-muji-muted opacity-60 hover:text-muji-brand hover:opacity-100 transition-colors"></i>
        </button>
      </div>

      <!-- 按鈕 2: ETF 交叉持股分析 -->
      <div class="relative group" data-aos="fade-up" data-aos-delay="150">
        <a href="https://etfcross.com/" 
           target="_blank"
           class="flex items-center justify-between w-full py-3.5 px-4 bg-white border border-muji-border rounded-xl shadow-[0_2px_8px_rgba(215,208,196,0.15)] hover:shadow-[0_8px_20px_rgba(74,96,109,0.12)] hover:-translate-y-1 hover:border-muji-brand/40 active:scale-[0.99] transition-all duration-300 pr-12">
          <div class="flex flex-col items-start text-left">
            <span class="text-[14.5px] font-medium tracking-wide text-muji-text group-hover:text-muji-brand transition-colors">🔀 ETF 交叉持股分析</span>
            <span class="text-[10px] text-muji-muted tracking-wider mt-0.5 font-light pl-[26px]">ETFCross</span>
          </div>
          <i data-lucide="arrow-up-right" class="w-4 h-4 text-muji-muted opacity-40 group-hover:text-muji-brand group-hover:opacity-100 group-hover:translate-x-1 group-hover:-translate-y-1 transition-all duration-300"></i>
        </a>
        <button onclick="openDrawer(1)" 
                class="absolute right-0 top-0 bottom-0 w-11 flex items-center justify-center border-l border-muji-border border-opacity-30 hover:bg-muji-brandLight rounded-r-xl transition-colors duration-150"
                aria-label="詳細資訊">
          <i data-lucide="info" class="w-4 h-4 text-muji-muted opacity-60 hover:text-muji-brand hover:opacity-100 transition-colors"></i>
        </button>
      </div>

      <!-- 按鈕 3: ETF 折溢價監控 -->
      <div class="relative group" data-aos="fade-up" data-aos-delay="200">
        <a href="https://twetf.com/" 
           target="_blank"
           class="flex items-center justify-between w-full py-3.5 px-4 bg-white border border-muji-border rounded-xl shadow-[0_2px_8px_rgba(215,208,196,0.15)] hover:shadow-[0_8px_20px_rgba(74,96,109,0.12)] hover:-translate-y-1 hover:border-muji-brand/40 active:scale-[0.99] transition-all duration-300 pr-12">
          <div class="flex flex-col items-start text-left">

          <div class="flex flex-col items-start text-left">
            <span class="text-[14.5px] font-medium tracking-wide text-muji-text group-hover:text-muji-brand transition-colors">🧘 紀律交易系統</span>
            <span class="text-[10px] text-muji-muted tracking-wider mt-0.5 font-light pl-[26px]">Disciplined Trading</span>
          </div>
          <i data-lucide="arrow-up-right" class="w-4 h-4 text-muji-muted opacity-40 group-hover:text-muji-brand group-hover:opacity-100 group-hover:translate-x-1 group-hover:-translate-y-1 transition-all duration-300"></i>
        </a>
        <button onclick="openDrawer(3)" 
                class="absolute right-0 top-0 bottom-0 w-11 flex items-center justify-center border-l border-muji-border border-opacity-30 hover:bg-muji-brandLight rounded-r-xl transition-colors duration-150"
                aria-label="詳細資訊">
          <i data-lucide="info" class="w-4 h-4 text-muji-muted opacity-60 hover:text-muji-brand hover:opacity-100 transition-colors"></i>
        </button>

           target="_blank"

        <span class="font-medium tracking-wide">Together Better</span>

  <!-- ================= 詳細資訊彈出抽屜 (Drawer) ================= -->

  </div>

    <div class="flex-shrink-0">
      <div class="w-12 h-1 bg-muji-border rounded-full mx-auto my-3.5 opacity-80"></div>
    </div>
    
    <!-- 抽屜內容 (若內容過長允許內部滾動，確保手機體驗) -->
    <div class="px-6 pb-8 pt-1 overflow-y-auto flex-1">
      <!-- 標題與網址 -->
      <div class="flex justify-between items-start mb-4">
        <div>
          <!-- ⭐ 抽屜標題 (套用品牌色) -->

          <p id="drawer-subtitle" class="text-[11px] text-muji-muted mt-0.5 tracking-wider font-light"></p>
        </div>
        <button onclick="closeDrawer()" class="p-1.5 rounded-full hover:bg-muji-brandLight text-muji-muted hover:text-muji-brand transition-colors flex-shrink-0">
          <i data-lucide="x" class="w-4.5 h-4.5"></i>
        </button>
      </div>

      <!-- 詳細說明區塊 -->

        <div>
          <h4 class="text-[11px] uppercase tracking-[0.15em] text-muji-brand font-semibold flex items-center gap-2 mb-2">
            <span class="w-1 h-3 bg-muji-brand/60 rounded-sm"></span>

          <ul id="drawer-features" class="text-xs text-muji-text font-light leading-relaxed space-y-1.5 pl-3 list-disc marker:text-muji-brand/60">

        </div>

            適合對象
          </h4>
          <ul id="drawer-targets" class="text-xs text-muji-text font-light leading-relaxed space-y-1.5 pl-3 list-disc marker:text-muji-brand/60">
            <!-- 動態插入 -->
          </ul>
        </div>
      </div>

      <!-- ⭐ 快速前往按鈕 (套用品牌色) -->
      <a id="drawer-link" href="#" target="_blank" 
         class="mt-6 flex items-center justify-center gap-2 w-full py-3.5 bg-muji-brand hover:bg-[#384a54] hover:shadow-lg hover:-translate-y-0.5 text-white text-xs font-light tracking-widest rounded-xl transition-all duration-300 shadow-sm">
        <span>開啟系統</span>
        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
      </a>
    </div>
  </div>

          "面臨複雜財務情境的雙薪家庭或中產階級：有房貸、子女教育費、多重收入交織，需要進行分段、動態模擬的投資人。"
        ],
        link: "https://roku-rgb.github.io/when-can-i-retire/#calculator"
      }
    ];

    function openDrawer(index) {
      const data = appData[index];
      
      document.getElementById('drawer-title').innerText = data.title;
      document.getElementById('drawer-subtitle').innerText = data.subtitle;
      document.getElementById('drawer-link').href = data.link;

      // 渲染核心功能
      const featuresUl = document.getElementById('drawer-features');
      featuresUl.innerHTML = '';
      data.features.forEach(feat => {
        const li = document.createElement('li');
        li.innerText = feat;
        featuresUl.appendChild(li);
      });

      // 渲染適合對象
      const targetsUl = document.getElementById('drawer-targets');
      targetsUl.innerHTML = '';
      data.targets.forEach(t => {
        const li = document.createElement('li');
        li.innerText = t;
        targetsUl.appendChild(li);
      });

      // 顯示遮罩與抽屜
      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('hidden');
      setTimeout(() => {
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-y-full');
      }, 10);
    }

    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('opacity-100');
      drawer.classList.add('translate-y-full');
      
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 350);
    }

    // 分享網頁功能
    function shareApp() {
      if (navigator.share) {
        navigator.share({
          title: 'PRStK Lab',
          text: 'PRStK Lab - 量化選股 ｜ 紀律交易 ｜ 策略優化',
          url: window.location.href
        }).catch(console.error);
      } else {
        // 備用複製網址
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        
        // 顯示一個精緻的複製提示 (套用品牌色)
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-12 left-1/2 -translate-x-1/2 bg-muji-brand text-white text-[11px] px-4 py-2.5 rounded-full tracking-widest z-50 shadow-md transition-opacity duration-300 whitespace-nowrap';
        toast.innerText = 'Together Better 連結已複製';
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          setTimeout(() => document.body.removeChild(toast), 300);
        }, 1500);
      }
    }
  </script>
</body>
</html>
