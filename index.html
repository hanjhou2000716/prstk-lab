  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 700,
      easing: 'ease-out-cubic',
      once: true,
      offset: 20
    });

    lucide.createIcons();

    // ==========================================
    // 跑馬燈 (Ticker) 即時數據與渲染
    // ==========================================
    // 備用靜態數據 (防止 API 請求時畫面跳動)
    const staticTickerSymbols = [
      { name: '台股加權', price: '加載中', pct: '0.00', isUp: true },
      { name: 'S&P500', price: '加載中', pct: '0.00', isUp: true },
      { name: '納斯達克', price: '加載中', pct: '0.00', isUp: true },
      { name: '費半', price: '加載中', pct: '0.00', isUp: true },
      { name: '006208', price: '加載中', pct: '0.00', isUp: true },
      { name: '00685L', price: '加載中', pct: '0.00', isUp: true },
      { name: '2330', price: '加載中', pct: '0.00', isUp: true },
      { name: 'QQQM', price: '加載中', pct: '0.00', isUp: true },
      { name: 'NVDA', price: '加載中', pct: '0.00', isUp: true },
      { name: 'TSM adr', price: '加載中', pct: '0.00', isUp: true }
    ];

    function renderTickerDOM(data) {
      const container = document.getElementById('ticker-content');
      let htmlString = '';

      data.forEach(item => {
        if (!item) return;
        // 台灣看盤習慣：漲紅跌綠
        const colorClass = item.isUp ? 'text-muji-up' : 'text-muji-down';
        const sign = item.isUp ? '▲' : '▼';
        
        htmlString += `
          <div class="flex items-center gap-1.5 mx-3.5">
            <span class="text-[10.5px] font-medium text-muji-text tracking-wider">${item.name}</span>
            <span class="text-[10.5px] font-semibold tracking-wide ${colorClass}">
              ${item.price} ${item.price === '加載中' ? '' : sign} (${item.pct}%)
            </span>
          </div>
          <div class="w-px h-3 bg-muji-border/50"></div>
        `;
      });

      // 複製一次數據，達到無縫滾動效果
      container.innerHTML = htmlString + htmlString;
    }

    async function fetchLiveTickerData() {
      // 使用 Yahoo Finance API 與 AllOrigins CORS 代理伺服器來繞過前端跨域限制
      const symbols = '^TWII,^GSPC,^IXIC,^SOX,006208.TW,00685L.TW,2330.TW,QQQM,NVDA,TSM';
      const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`;
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      
      try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('網路請求失敗');
        const data = await response.json();
        const results = data.quoteResponse.result;
        
        // Yahoo API 符號對應 UI 顯示名稱
        const mapping = {
          '^TWII': '台股加權',
          '^GSPC': 'S&P500',
          '^IXIC': '納斯達克',
          '^SOX': '費半',
          '006208.TW': '006208',
          '00685L.TW': '00685L',
          '2330.TW': '2330',
          'QQQM': 'QQQM',
          'NVDA': 'NVDA',
          'TSM': 'TSM adr'
        };
        
        // 確保陣列的顯示順序符合要求
        const order = ['^TWII', '^GSPC', '^IXIC', '^SOX', '006208.TW', '00685L.TW', '2330.TW', 'QQQM', 'NVDA', 'TSM'];
        
        return order.map(sym => {
          const quote = results.find(q => q.symbol === sym);
          if (quote) {
            // 處理小數點與千分位格式
            const price = quote.regularMarketPrice ? quote.regularMarketPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : 'N/A';
            const pctVal = quote.regularMarketChangePercent || 0;
            const pct = pctVal.toFixed(2);
            const isUp = pctVal >= 0;
            return { name: mapping[sym], price, pct: (isUp ? '+' : '') + pct, isUp };
          }
          return staticTickerSymbols.find(item => item.name === mapping[sym]);
        });
      } catch (error) {
        console.warn("無法獲取即時股價，使用備用數據", error);
        return staticTickerSymbols;
      }
    }

    async function initTicker() {
      // 1. 先渲染加載中狀態，避免畫面空轉跳動
      renderTickerDOM(staticTickerSymbols);
      
      // 2. 獲取即時資料並重新渲染
      const liveData = await fetchLiveTickerData();
      renderTickerDOM(liveData);
      
      // 3. 設定定時器，每 3 分鐘 (180000毫秒) 自動刷新一次即時數據
      setInterval(async () => {
        const updatedData = await fetchLiveTickerData();
        renderTickerDOM(updatedData);
      }, 180000);
    }

    // 頁面載入時初始化跑馬燈
    document.addEventListener('DOMContentLoaded', initTicker);

    // 卡片資訊彈出抽屜設定
    // ==========================================
    // 依照新的網格順序對應陣列資料
    const appData = [
      {
        title: "🦅 股市智投",
        subtitle: "StockIntelli",

    function openDrawer(index) {
      const data = appData[index];
      
      document.getElementById('drawer-title').innerText = data.title;
      document.getElementById('drawer-subtitle').innerText = data.subtitle;
      document.getElementById('drawer-link').href = data.link;

      const featuresUl = document.getElementById('drawer-features');
      featuresUl.innerHTML = '';
      data.features.forEach(feat => {
        const li = document.createElement('li');
        li.innerText = feat;
        featuresUl.appendChild(li);
      });

      const targetsUl = document.getElementById('drawer-targets');
      targetsUl.innerHTML = '';
      data.targets.forEach(t => {
        const li = document.createElement('li');
        li.innerText = t;
        targetsUl.appendChild(li);
      });

      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('hidden');
      setTimeout(() => {
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-y-full');
      }, 10);
    }

    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      const drawer = document.getElementById('info-drawer');
      
      overlay.classList.remove('opacity-100');
      drawer.classList.add('translate-y-full');
      
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 350);
    }
  </script>
